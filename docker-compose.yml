version: '3.8'

services:
  # MQTT Broker - EMQX
  emqx:
    image: emqx/emqx:5.3.1
    container_name: water-monitor-emqx
    ports:
      - "1883:1883"       # MQTT
      - "8083:8083"       # WebSocket MQTT
      - "8084:8084"       # MQTT over SSL/TLS
      - "18083:18083"     # Dashboard
    environment:
      - EMQX_ALLOW_ANONYMOUS=true
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-etc:/opt/emqx/etc
    restart: unless-stopped
    networks:
      - water-monitor-net

  # MongoDB - 时序数据存储
  mongodb:
    image: mongo:6.0
    container_name: water-monitor-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: watermonitor123
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - water-monitor-net

  # Redis - 实时状态缓存
  redis:
    image: redis:7-alpine
    container_name: water-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - water-monitor-net

  # Node.js 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: water-monitor-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:watermonitor123@mongodb:27017/water_monitor?authSource=admin
      - REDIS_URI=redis://redis:6379
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
      - JWT_SECRET=water_monitor_secure_jwt_secret_key
      - PORT=3000
    depends_on:
      - mongodb
      - redis
      - emqx
    restart: unless-stopped
    networks:
      - water-monitor-net

  # React 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: water-monitor-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - water-monitor-net

volumes:
  emqx-data:
  emqx-etc:
  mongo-data:
  redis-data:

networks:
  water-monitor-net:
    driver: bridge
